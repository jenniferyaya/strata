<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strata — Literary Geography</title>
  <link rel="stylesheet" href="https://use.typekit.net/kub5gzl.css">

  <style>
    /* ─────────────────────────────────────────
       RESET & BASE
    ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #EAECEE;
      --surface:   #FFFFFF;
      --text:      #323232;
      --text-sub:  #4A4D54;
      --accent:    #E4ECF1;
      --accent-dk: #B8C9D4;
      --ocean:     #DDE6EC;
      --hover:     rgba(210,224,234,0.30);
      --divider:   rgba(180,196,208,0.40);
      --font:      "neulis-neue", sans-serif;
      --shelf-w:   500px;
      --nav-h:     52px;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-weight: 400;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ─────────────────────────────────────────
       NAV
    ───────────────────────────────────────── */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      background: #ffffff;
      border-bottom: 1px solid var(--divider);
    }
    .nav-wordmark {
      font-weight: 400; font-size: 15px; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--text);
    }
    .nav-right { display: flex; align-items: center; gap: 28px; }
    .nav-right a {
      font-size: 12px; font-weight: 400; letter-spacing: 0.1em;
      color: var(--text-sub); text-decoration: none; transition: color 0.2s;
    }
    .nav-right a:hover { color: var(--text); }

    /* ─────────────────────────────────────────
       APP SHELL
    ───────────────────────────────────────── */
    .app {
      display: grid;
      grid-template-columns: 1fr var(--shelf-w);
      height: 100vh;
      padding-top: var(--nav-h);
    }

    /* ─────────────────────────────────────────
       MAP PANEL
    ───────────────────────────────────────── */
    .map-panel {
      position: relative;
      background: var(--ocean);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Continent buttons in nav ── */
    .nav-continents {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .cont-btn {
      font-family: var(--font);
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-sub);
      background: none;
      border: none;
      cursor: pointer;
      padding: 5px 10px;
      transition: color 0.2s, background 0.2s;
      white-space: nowrap;
    }
    .cont-btn.active {
      color: #ffffff;
      font-weight: 400;
      background: #6b6e78;
    }

    /* ── Map viewport ── */
    .map-viewport {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #flat-map {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .country-path {
      fill: #F5F8FA;
      stroke: var(--accent-dk);
      stroke-width: 0.6;
      cursor: pointer;
      transition: fill 0.15s;
    }

    .country-path.active-country { fill: var(--accent); stroke: var(--accent-dk); }
    .country-path.country-inert { cursor: default; }

    /* ── Map loading skeleton ── */
    .map-loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 5;
      background: var(--ocean);
      transition: opacity 0.4s ease;
      pointer-events: none;
    }
    .map-loading.hidden { opacity: 0; }
    .map-loading-bar-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 160px;
    }
    .map-loading-bar {
      height: 3px;
      background: var(--accent);
      border-radius: 2px;
      transform-origin: left;
      animation: skeletonPulse 1.4s ease-in-out infinite;
    }
    .map-loading-bar:nth-child(2) { animation-delay: 0.15s; width: 80%; }
    .map-loading-bar:nth-child(3) { animation-delay: 0.3s;  width: 55%; }
    @keyframes skeletonPulse {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 1;   }
    }
    .map-loading-label {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-sub);
    }

    /* Coming-soon overlay */
    .map-coming-soon {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .map-coming-soon.visible { opacity: 1; }
    .map-coming-soon-label {
      font-size: 10px; font-weight: 400; letter-spacing: 0.28em;
      text-transform: uppercase; color: var(--text-sub);
    }
    .map-coming-soon-sub {
      font-size: 12px; font-weight: 400; color: var(--text-sub);
    }



    /* ── Zoom controls ── */
    .zoom-controls {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .zoom-btn {
      width: 40px;
      height: 40px;
      background: #ffffff;
      border: 1px solid var(--divider);
      color: var(--text);
      font-family: var(--font);
      font-size: 16px;
      font-weight: 400;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      user-select: none;
    }
    .zoom-btn:hover  { background: var(--accent); }
    .zoom-btn:active { background: var(--accent-dk); color: var(--text); }

    /* ── Book pins ── */
    .book-pin {
      cursor: pointer;
      transition: opacity 0.35s ease;
    }
    .book-pin.hidden { opacity: 0; pointer-events: none; }

    .book-pin circle {
      fill: var(--text);
    }
    .book-pin:hover circle { r: 6; }

    .book-pin text {
      font-family: var(--font);
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      fill: var(--text);
      pointer-events: none;
      dominant-baseline: middle;
    }


    /* ─────────────────────────────────────────
       SHELF PANEL
    ───────────────────────────────────────── */
    .shelf {
      background: var(--surface);
      display: flex; flex-direction: column;
      height: 100%; overflow: hidden;
      border-left: 1px solid var(--divider);
    }

    .shelf-search {
      padding: 16px 28px;
      border-bottom: 1px solid var(--divider);
      flex-shrink: 0;
    }
    .search-input-wrap { position: relative; display: flex; align-items: center; width: 100%; }
    .search-icon {
      position: absolute; left: 0; width: 14px; height: 14px;
      color: var(--text-sub); pointer-events: none; flex-shrink: 0;
    }
    .search-input {
      width: 100%; padding: 6px 0 6px 22px;
      font-family: var(--font); font-size: 12px; font-weight: 400;
      letter-spacing: 0.04em; color: var(--text);
      background: transparent; border: none; outline: none;
    }
    .search-input::placeholder { color: var(--text-sub); letter-spacing: 0.08em; }
    .search-results {
      position: absolute; top: calc(100% + 8px); left: 0; right: 0;
      background: var(--surface); border: 1px solid var(--divider);
      z-index: 50; display: none;
    }
    .search-results.open { display: block; }
    .search-result-item {
      padding: 10px 12px; cursor: pointer;
      border-bottom: 1px solid var(--divider); transition: background 0.15s;
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: var(--hover); }
    .sr-title { font-size: 13px; font-weight: 400; color: var(--text); margin-bottom: 2px; }
    .sr-meta  { font-size: 11px; font-weight: 400; color: var(--text-sub); }

    .shelf-header { padding: 28px 28px 0; flex-shrink: 0; }
    .shelf-city-name {
      font-size: 36px; font-weight: 700; letter-spacing: -0.02em;
      line-height: 1; color: var(--text); margin-bottom: 8px;
    }
    .shelf-era-range {
      font-size: 13px; font-weight: 400; font-style: italic;
      color: var(--text-sub); margin-bottom: 20px;
    }
    .shelf-meta {
      display: flex; gap: 24px; padding-bottom: 22px;
    }
    .shelf-meta-item { display: flex; flex-direction: column; gap: 3px; }
    .shelf-meta-val { font-size: 18px; font-weight: 400; line-height: 1; color: var(--text); }
    .shelf-meta-key { font-size: 10px; font-weight: 400; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-sub); }

    .shelf-filters {
      padding: 16px 28px 0;
      flex-shrink: 0;
    }
    .era-chips {
      display: flex;
      gap: 6px;
      padding-bottom: 24px;
    }
    .era-chip {
      font-family: var(--font);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-sub);
      background: transparent;
      border: 1px solid var(--divider);
      border-radius: 20px;
      padding: 5px 14px;
      cursor: pointer;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .era-chip:hover {
      color: var(--text);
      border-color: var(--accent-dk);
    }
    .era-chip.active {
      color: var(--text);
      background: var(--accent);
      border-color: var(--accent-dk);
    }

    .shelf-inner {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 0 28px 48px;
      scrollbar-width: thin; scrollbar-color: var(--divider) transparent;
      transition: opacity 0.28s ease;
    }
    .shelf-inner.fading { opacity: 0; }
    .shelf-inner::-webkit-scrollbar { width: 4px; }
    .shelf-inner::-webkit-scrollbar-track { background: transparent; }
    .shelf-inner::-webkit-scrollbar-thumb { background: var(--divider); }

    .shelf-section-label {
      font-size: 12px; font-weight: 400; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--text-sub);
      padding-top: 24px; padding-bottom: 14px;
    }
    .book-list { list-style: none; }
    .book-item {
      padding: 16px 28px; margin: 0 -28px;
      border-bottom: 1px solid var(--divider);
      cursor: pointer; transition: background 0.15s;
    }
    .book-item:first-child { border-top: 1px solid var(--divider); }
    .book-item:hover { background: var(--hover); }



    .empty-state {
      padding: 24px 0 8px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      list-style: none;
    }
    .empty-state-msg {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-sub);
    }





    .shelf-header-inner { transition: opacity 0.28s ease; }
    .shelf-header-inner.fading { opacity: 0; }

    /* ─────────────────────────────────────────
       RESPONSIVE
    ───────────────────────────────────────── */

    /* ── Tablet (≤1024px): narrow shelf ── */
    @media (max-width: 1024px) {
      :root { --shelf-w: 380px; }
      .shelf-city-name { font-size: 28px; }
      .shelf-header { padding: 22px 22px 0; }
      .shelf-inner { padding: 0 22px 40px; }
      .book-item { padding: 15px 22px; margin: 0 -22px; }
      .shelf-search { padding: 14px 22px; }
      .shelf-filters { padding: 12px 22px 0; }
      .shelf-breadcrumb { padding: 8px 22px; }
      .city-group-header { padding: 14px 22px 8px; margin: 0 -22px; }
    }

    /* ── Mobile (≤768px): stacked layout ── */
    @media (max-width: 768px) {
      :root {
        --nav-h: 52px;
        --shelf-w: 100%;
      }

      html, body { overflow: auto; height: auto; }

      /* Stack map above shelf */
      .app {
        display: flex;
        flex-direction: column;
        height: auto;
        min-height: 100vh;
        padding-top: var(--nav-h);
      }

      /* Map takes upper 50% of viewport */
      .map-panel {
        height: 50vh;
        min-height: 280px;
        flex-shrink: 0;
      }

      /* Shelf fills remaining space naturally */
      .shelf {
        height: auto;
        min-height: 50vh;
        border-left: none;
        border-top: 1px solid var(--divider);
        overflow: visible;
      }
      .shelf-inner { overflow-y: visible; }

      /* Nav: hide continent bar, keep wordmark + approach link */
      .nav { padding: 0 20px; }
      .nav-continents {
        position: static;
        transform: none;
        display: none; /* hidden on mobile — continent switching via map only */
      }

      /* Shelf header tighter */
      .shelf-header { padding: 20px 20px 0; }
      .shelf-city-name { font-size: 26px; }
      .shelf-era-range { margin-bottom: 14px; }
      .shelf-meta { gap: 20px; padding-bottom: 18px; }

      /* Filters */
      .shelf-filters { padding: 12px 20px 0; }
      .era-chips { gap: 5px; flex-wrap: wrap; }
      .era-chip { padding: 5px 11px; font-size: 10px; }

      /* Breadcrumb */
      .shelf-breadcrumb { padding: 8px 20px; }

      /* Book list */
      .shelf-inner { padding: 0 20px 40px; }
      .book-item { padding: 16px 20px; margin: 0 -20px; }
      .city-group-header { padding: 14px 20px 8px; margin: 0 -20px; }

      /* Search */
      .shelf-search { padding: 14px 20px; }

      /* Zoom controls — keep bottom-right but slightly smaller */
      .zoom-btn { width: 30px; height: 30px; font-size: 15px; }

      /* Expand panels — constrain height */
      .book-item.open .book-expand { max-height: 400px; }
    }

    /* ── Small mobile (≤480px) ── */
    @media (max-width: 480px) {
      .map-panel { height: 45vh; min-height: 240px; }
      .shelf-city-name { font-size: 22px; }
      .shelf-meta-val { font-size: 16px; }
      .era-chip { padding: 4px 10px; }
    }

    /* ── Breadcrumb (city view only) ── */
    .shelf-breadcrumb {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 28px;
      border-bottom: 1px solid var(--divider);
      flex-shrink: 0;
    }
    .shelf-breadcrumb.visible { display: flex; }
    .breadcrumb-back {
      font-family: var(--font);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--text-sub);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: color 0.15s;
    }
    .breadcrumb-back:hover { color: var(--text); }
    .breadcrumb-sep { color: var(--divider); }
    .breadcrumb-city { font-size: 11px; font-weight: 400; color: var(--text); letter-spacing: 0.06em; }

    /* ── City group header (country view) ── */
    .city-group-header {
      list-style: none;
      padding: 16px 28px 8px;
      margin: 0 -28px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-sub);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      transition: color 0.15s;
    }
    .city-group-header:hover { color: var(--text); }
    .city-group-count {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.06em;
    }

    /* ── Book item expand/collapse ── */
    .book-title { font-size: 16px; font-weight: 400; color: var(--text); margin-bottom: 4px; line-height: 1.3; }
    .book-meta-row { display: flex; flex-direction: column; gap: 3px; }
    .book-author-year { font-size: 12px; font-weight: 400; color: var(--text-sub); }
    .book-neighborhood { font-size: 11px; font-weight: 400; color: var(--text-sub); }
    .book-item-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .book-item-toggle {
      font-size: 12px;
      color: var(--text-sub);
      flex-shrink: 0;
      margin-top: 2px;
      transition: transform 0.2s ease, color 0.15s;
      line-height: 1;
    }
    .book-item.open .book-item-toggle {
      transform: rotate(180deg);
      color: var(--text);
    }
    .book-expand {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.3s ease, opacity 0.25s ease;
      opacity: 0;
    }
    .book-item.open .book-expand {
      max-height: 300px;
      opacity: 1;
    }
    .book-expand-inner {
      padding-top: 14px;
    }
    .book-synopsis {
      font-size: 13px;
      font-weight: 400;
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 14px;
    }
    .book-quote {
      font-size: 13px;
      font-weight: 400;
      font-style: italic;
      line-height: 1.65;
      color: var(--text-sub);
      padding-left: 14px;
      border-left: 2px solid var(--accent-dk);
    }
  </style>
</head>
<body>

  <!-- ── NAV ── -->
  <nav class="nav">
    <span class="nav-wordmark">Strata</span>
    <div class="nav-continents" id="continent-bar">
      <button class="cont-btn active" data-continent="world">World</button>
      <button class="cont-btn" data-continent="africa">Africa</button>
      <button class="cont-btn" data-continent="asia">Asia</button>
      <button class="cont-btn" data-continent="europe">Europe</button>
      <button class="cont-btn" data-continent="north-america">N. America</button>
      <button class="cont-btn" data-continent="south-america">S. America</button>
      <button class="cont-btn" data-continent="oceania">Oceania</button>
    </div>
    <div class="nav-right">
      <a href="approach.html">Approach</a>
    </div>
  </nav>

  <!-- ── APP SHELL ── -->
  <div class="app">

    <!-- ══ MAP PANEL ══ -->
    <div class="map-panel">

      <!-- Flat SVG map -->
      <div class="map-viewport">
        <svg id="flat-map" xmlns="http://www.w3.org/2000/svg"></svg>

        <!-- Loading skeleton -->
        <div class="map-loading" id="map-loading">
          <div class="map-loading-bar-wrap">
            <div class="map-loading-bar"></div>
            <div class="map-loading-bar"></div>
            <div class="map-loading-bar"></div>
          </div>
          <div class="map-loading-label">Loading map</div>
        </div>

        <div class="map-coming-soon" id="map-coming-soon">
          <div class="map-coming-soon-label">Coming Soon</div>
          <div class="map-coming-soon-sub">Literary geography for this region is in progress.</div>
        </div>

        <div class="zoom-controls">
          <button class="zoom-btn" id="zoom-in"  aria-label="Zoom in">+</button>
          <button class="zoom-btn" id="zoom-out" aria-label="Zoom out">−</button>
          <button class="zoom-btn" id="zoom-reset" aria-label="Reset view">↺</button>
        </div>
      </div>

    </div><!-- /map-panel -->

    <!-- ══ SHELF PANEL ══ -->
    <aside class="shelf">

      <!-- Search -->
      <div class="shelf-search">
        <div class="search-input-wrap">
          <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="6.5" cy="6.5" r="4.5"/>
            <line x1="10" y1="10" x2="14" y2="14"/>
          </svg>
          <input class="search-input" id="search-input" type="text"
            placeholder="Search title, author, neighbourhood…" autocomplete="off">
          <div class="search-results" id="search-results"></div>
        </div>
      </div>

      <!-- Header -->
      <div class="shelf-header">
        <div class="shelf-header-inner" id="shelf-header-inner">
          <div class="shelf-city-name" id="shelf-city-name">United States of America</div>
          <div class="shelf-era-range" id="shelf-era-range">Mid 20th century</div>
          <div class="shelf-meta">
            <div class="shelf-meta-item">
              <span class="shelf-meta-val" id="shelf-works">9</span>
              <span class="shelf-meta-key">Works</span>
            </div>
            <div class="shelf-meta-item">
              <span class="shelf-meta-val">3</span>
              <span class="shelf-meta-key">Eras</span>
            </div>
            <div class="shelf-meta-item">
              <span class="shelf-meta-val" id="shelf-locations">40+</span>
              <span class="shelf-meta-key">Locations</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Breadcrumb (visible in city view when parent country has siblings) -->
      <div class="shelf-breadcrumb" id="shelf-breadcrumb">
        <button class="breadcrumb-back" id="breadcrumb-back">← All cities</button>
        <span class="breadcrumb-sep">/</span>
        <span class="breadcrumb-city" id="breadcrumb-city"></span>
      </div>

      <!-- Era filter -->
      <div class="shelf-filters">
        <div class="era-chips">
          <button class="era-chip active" data-era="all">All</button>
          <button class="era-chip" data-era="0">Pre-1920</button>
          <button class="era-chip" data-era="1">Mid 20th C.</button>
          <button class="era-chip" data-era="2">Contemporary</button>
        </div>
      </div>

      <!-- Book list -->
      <div class="shelf-inner" id="shelf-inner">
        <div class="shelf-section-label">Works in this era</div>
        <ul class="book-list" id="book-list"></ul>
      </div>

    </aside>
  </div>

  <script>
  /* ══════════════════════════════════════════════════
     DATA
  ══════════════════════════════════════════════════ */

  /* era index: 0 = 1880–1910 · 1 = 1920–1945 · 2 = 1950–1980 */
  const cityData = {
    "Abidjan": {
      lat: 5.319, lng: -4.0695,
      era: "Contemporary",
      works: 1, locations: "—",

      'Ethiopia','Gabon','Gambia','The Gambia','Ghana','Guinea','Guinea-Bissau',
      "Cote d'Ivoire","Côte d'Ivoire",'Ivory Coast',
      'Kenya','Lesotho','Liberia','Libya','Madagascar','Malawi',
      'Mali','Mauritania','Mauritius','Morocco','Mozambique','Namibia',
      'Niger','Nigeria','Rwanda',
      'São Tomé and Príncipe','Sao Tome and Principe',
      'Senegal','Seychelles','Sierra Leone','Somalia','Somaliland',
      'South Africa',
      'South Sudan','S. Sudan',
      'Sudan','Tanzania',
      'Togo','Tunisia','Uganda','W. Sahara','Western Sahara',
      'Zambia','Zimbabwe',
    ],
    'asia': [
      'Afghanistan','Armenia','Azerbaijan','Bahrain','Bangladesh','Bhutan','Brunei',
      'Cambodia','China','Cyprus','N. Cyprus','Georgia','India','Indonesia','Iran','Iraq',
      'Israel','Japan','Jordan','Kazakhstan','Kuwait','Kyrgyzstan','Laos','Lebanon',
      'Malaysia','Maldives','Mongolia','Myanmar','Nepal',
      'North Korea','Dem. Rep. Korea',
      'Oman','Pakistan',
      'Palestinian Territory','West Bank','Gaza',
      'Philippines','Qatar','Saudi Arabia',

      'Sri Lanka','Syria','Taiwan','Tajikistan',
      'Thailand','Timor-Leste','East Timor',

    ],
    'north-america': [
      'Antigua and Barbuda','Bahamas','Barbados','Belize','Canada','Costa Rica',
      'Cuba','Dominica','Dominican Republic','Dominican Rep.',
      'El Salvador','Grenada','Guatemala',
      'Haiti','Honduras','Jamaica','Mexico','Nicaragua','Panama',

      'Australia','Fiji','Kiribati','Marshall Islands','Micronesia','Nauru',
      'New Zealand','Palau','Papua New Guinea','Samoa','Solomon Islands',
      'Tonga','Tuvalu','Vanuatu',
    ],
  };

  /* Projection — equirectangular for all views */
  function makeProjection(bbox, W, H) {
    const [minLng, minLat, maxLng, maxLat] = bbox;
    const pad = 36;
    const scX = (W - pad * 2) / (maxLng - minLng);
    const scY = (H - pad * 2) / (maxLat  - minLat);
    const sc  = Math.min(scX, scY);
    const ox  = (W - (maxLng - minLng) * sc) / 2;
    const oy  = (H - (maxLat  - minLat) * sc) / 2;
    return (lng, lat) => [
      ox + (lng - minLng) * sc,
      oy + (maxLat - lat) * sc
    ];
  }

  function toPath(rings, proj) {
    return rings.map(ring =>
      ring.map(([lng, lat], i) => {
        const [x, y] = proj(lng, lat);
        return (i === 0 ? `M` : `L`) + x.toFixed(1) + ',' + y.toFixed(1);
      }).join(' ') + 'Z'
    ).join(' ');
  }

  function renderMap(continent) {
    const vp   = svg.parentElement;
    const W    = vp.getBoundingClientRect().width  || vp.offsetWidth  || 800;
    const H    = vp.getBoundingClientRect().height || vp.offsetHeight || 500;
    const isWorld = continent === 'world';
    const proj = makeProjection(continentConfig[continent].bbox, W, H);
    const allowed = isWorld ? null : new Set(continentCountries[continent] || []);

    /* clear land */
    while (landLayer.firstChild) landLayer.removeChild(landLayer.firstChild);

    geoFeatures.forEach(f => {
      const name = f.properties.NAME || f.properties.name
                || f.properties.ADMIN || f.properties.admin || '';
      if (allowed && !allowed.has(name)) return;

      const geom  = f.geometry;
      const polys = geom.type === 'Polygon'       ? [geom.coordinates]
                  : geom.type === 'MultiPolygon'  ?  geom.coordinates : [];

      polys.forEach(poly => {
        const d = toPath(poly, proj);
        if (!d) return;
        const path = document.createElementNS('http://www.w3.org/2000/svg','path');
        path.setAttribute('d', d);
        const hasCities = name in cityMap;
        path.setAttribute('class', 'country-path' + (hasCities ? '' : ' country-inert'));
        path.dataset.country = name;
        if (hasCities) {
          path.addEventListener('click', () => {
            selectCountry(name);
          });
        }
        landLayer.appendChild(path);
      });
    });

    renderPins(continent, proj);
  }

  function renderPins(continent, proj) {
    while (pinLayer.firstChild) pinLayer.removeChild(pinLayer.firstChild);

    Object.entries(cityData).forEach(([cityName, d]) => {
      if (continent !== 'world' && cityContinent[cityName] !== continent) return;

      const [x, y] = proj(d.lng, d.lat);
      const hasBooks = d.books.some(b => activeEraFilter === null || b.era === activeEraFilter);

      const g = document.createElementNS('http://www.w3.org/2000/svg','g');
      g.setAttribute('class', 'book-pin' + (hasBooks ? '' : ' hidden'));
      g.dataset.city = cityName;

      const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
      circle.setAttribute('cx', x);
      circle.setAttribute('cy', y);
      circle.setAttribute('r',  3.5);

      const text = document.createElementNS('http://www.w3.org/2000/svg','text');
      text.setAttribute('x', x + 9);
      text.setAttribute('y', y);
      text.textContent = cityName;

      g.appendChild(circle);
      g.appendChild(text);
      pinLayer.appendChild(g);

      g.addEventListener('click', () => selectCity(cityName));
    });
  }

  function refreshPins() {
    /* try to refresh in-place; if projection changed, full re-render */
    pinLayer.querySelectorAll('.book-pin').forEach(g => {
      const d = cityData[g.dataset.city];
      if (!d) return;
      const show = d.books.some(b => activeEraFilter === null || b.era === activeEraFilter);
      g.classList.toggle('hidden', !show);
    });
  }

  /* Country → [cities] — supports multi-city countries */
  const countryToCities = {
    'France':                   ['Paris', 'Marseille'],
    'Spain':                    ['Madrid'],
    'United Kingdom':           ['London', 'Edinburgh', 'Berkshire'],
    'Sweden':                   ['Stockholm'],
    'Portugal':                 ['Lisbon'],
    'Argentina':                ['Buenos Aires'],
    'Brazil':                   ['Rio de Janeiro'],
    'Nigeria':                  ['Akure', 'Ibadan'],
    'Algeria':                  ['Algiers'],
    'Rwanda':                   ['Kigali'],
    'Burundi':                  ['Bujumbura'],
    "Cote d'Ivoire":            ['Abidjan'],
    "Côte d'Ivoire":            ['Abidjan'],
    'Ivory Coast':              ['Abidjan'],
    'Egypt':                    ['Thebes'],
    'Japan':                    ['Tokyo', 'Matsuyama'],
    'Turkey':                   ['Istanbul'],
    'United States of America': ['New York', 'Los Angeles', 'Tennessee'],
    'Slovenia':                   ['Jesenice'],
    'Canada':                   ['Toronto', 'Montréal'],
    'Jamaica':                  ['Kingston'],
    'North Korea':              ['Pyongyang'],
    'Palestinian Territory':    ['Nablus'],
    'West Bank':                ['Nablus'],
  };

  /* Flat cityMap: country → first city (for hasCities check in renderMap) */
  const cityMap = {};
  Object.entries(countryToCities).forEach(([c, cities]) => { cityMap[c] = cities[0]; });

  /* Reverse: city → country */
  const cityToCountry = {};
  Object.entries(countryToCities).forEach(([country, cities]) => {
    cities.forEach(city => { if (!cityToCountry[city]) cityToCountry[city] = country; });
  });

  let activeCountry = null;
  fetch('https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson')
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .catch(() => fetch('https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson').then(r => r.json()))
    .then(data => {
      geoFeatures = data.features;
      requestAnimationFrame(() => {
        renderMap(activeContinent);
        applyTransform();
        const loader = document.getElementById('map-loading');
        loader.classList.add('hidden');
        setTimeout(() => { loader.style.display = 'none'; }, 420);
      });
    });

  window.addEventListener('resize', () => { if (geoFeatures.length) renderMap(activeContinent); });

  /* ══════════════════════════════════════════════════
     CONTINENT SWITCHING
  ══════════════════════════════════════════════════ */
  document.getElementById('continent-bar').addEventListener('click', e => {
    const btn = e.target.closest('.cont-btn');
    if (!btn) return;
    const cont = btn.dataset.continent;
    document.querySelectorAll('.cont-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeContinent = cont;
    zoomScale = 1; panX = 0; panY = 0;
    zoomGroup.setAttribute('transform', '');
    mapVp.style.cursor = 'default';
    const avail = cont === 'world' || continentConfig[cont].available;
    document.getElementById('map-coming-soon').classList.toggle('visible', !avail);
    if (geoFeatures.length) { renderMap(cont); applyTransform(); }
  });

  /* ══════════════════════════════════════════════════
     SHELF
  ══════════════════════════════════════════════════ */
  function selectCountry(countryName) {
    const cities = (countryToCities[countryName] || []).filter(c => cityData[c]);
    if (!cities.length) return;

    /* Single-city country — go straight to city view */
    if (cities.length === 1) { selectCity(cities[0]); return; }

    activeCountry = countryName;
    activeCity    = null;

    /* Highlight country shape */
    document.querySelectorAll('.country-path').forEach(p => p.classList.remove('active-country'));
    document.querySelectorAll(`.country-path[data-country="${countryName}"]`)
      .forEach(p => p.classList.add('active-country'));

    /* Hide breadcrumb in country view */
    document.getElementById('shelf-breadcrumb').classList.remove('visible');

    const inner  = document.getElementById('shelf-inner');
    const header = document.getElementById('shelf-header-inner');
    inner.classList.add('fading');
    header.classList.add('fading');

    setTimeout(() => {
      renderCountryShelf(countryName, cities);
      inner.classList.remove('fading');
      header.classList.remove('fading');
    }, 280);
  }

  function selectCity(cityName) {
    if (!cityData[cityName]) return;
    activeCity    = cityName;
    activeCountry = cityToCountry[cityName] || null;

    /* Highlight country shape */
    document.querySelectorAll('.country-path').forEach(p => p.classList.remove('active-country'));
    if (activeCountry) {
      document.querySelectorAll(`.country-path[data-country="${activeCountry}"]`)
        .forEach(p => p.classList.add('active-country'));
    }

    /* Show breadcrumb if this city has siblings in its country */
    const siblings = activeCountry
      ? (countryToCities[activeCountry] || []).filter(c => cityData[c])
      : [];
    const crumb = document.getElementById('shelf-breadcrumb');
    if (siblings.length > 1) {
      document.getElementById('breadcrumb-city').textContent = cityName;
      crumb.classList.add('visible');
    } else {
      crumb.classList.remove('visible');
    }

    const inner  = document.getElementById('shelf-inner');
    const header = document.getElementById('shelf-header-inner');
    inner.classList.add('fading');
    header.classList.add('fading');

    setTimeout(() => {
      renderShelf(cityName);
      inner.classList.remove('fading');
      header.classList.remove('fading');
    }, 280);
  }

  /* ── Country view ── */
  function renderCountryShelf(countryName, cities) {
    const total = cities.reduce((n, c) => n + (cityData[c] ? cityData[c].books.length : 0), 0);
    document.getElementById('shelf-city-name').textContent = countryName;
    document.getElementById('shelf-era-range').textContent = cities.length + ' cities';
    document.getElementById('shelf-works').textContent     = total;
    document.getElementById('shelf-locations').textContent = '—';

    const inner = document.getElementById('shelf-inner');
    inner.innerHTML = `
      <div class="shelf-section-label" id="shelf-section-label">All works</div>
      <ul class="book-list" id="book-list"></ul>`;

    renderCountryBooks(cities);
  }

  function renderCountryBooks(cities) {
    const eraNames = ['Pre-1920', 'Mid 20th C.', 'Contemporary'];
    const label = document.getElementById('shelf-section-label');
    if (label) label.textContent = activeEraFilter !== null ? eraNames[activeEraFilter] : 'All works';

    const list = document.getElementById('book-list');
    if (!list) return;

    let html = '';
    let hasAny = false;

    cities.forEach(cityName => {
      const d = cityData[cityName];
      if (!d) return;
      const filtered = d.books.filter(b => activeEraFilter === null || b.era === activeEraFilter);
      if (!filtered.length) return;
      hasAny = true;
      html += `<li class="city-group-header" data-city="${cityName}">
        <span>${cityName}</span>
        <span class="city-group-count">${filtered.length} work${filtered.length !== 1 ? 's' : ''}</span>
      </li>`;
      html += filtered.map(b => bookItemHTML(b)).join('');
    });

    list.innerHTML = hasAny
      ? html
      : `<li class="empty-state"><span class="empty-state-msg">No works mapped for this era yet.</span></li>`;

    if (hasAny) {
      wireBookExpand(list);
      list.querySelectorAll('.city-group-header').forEach(el => {
        el.addEventListener('click', () => selectCity(el.dataset.city));
      });
    }
  }

  /* ── City view ── */
  function renderShelf(cityName) {
    const d = cityData[cityName];
    document.getElementById('shelf-city-name').textContent = cityName;
    document.getElementById('shelf-era-range').textContent = d.era;
    document.getElementById('shelf-works').textContent     = d.works;
    document.getElementById('shelf-locations').textContent = d.locations;

    const inner = document.getElementById('shelf-inner');
    inner.innerHTML = `
      <div class="shelf-section-label" id="shelf-section-label">All works</div>
      <ul class="book-list" id="book-list"></ul>`;

    renderBookList(cityName);
  }

  function renderBookList(cityName) {
    const d = cityData[cityName];
    if (!d) return;

    const eraNames = ['Pre-1920', 'Mid 20th C.', 'Contemporary'];
    const filtered = d.books.filter(b =>
      activeEraFilter === null || b.era === activeEraFilter
    );

    /* Update section label */
    const label = document.getElementById('shelf-section-label');
    if (label) label.textContent = activeEraFilter !== null
      ? eraNames[activeEraFilter]
      : 'All works';

    const list = document.getElementById('book-list');
    if (!list) return;

    if (!filtered.length) {
      list.innerHTML = `<li class="empty-state">
        <span class="empty-state-msg">No works mapped for this era yet.</span>
      </li>`;
      return;
    }

    list.innerHTML = filtered.map(b => bookItemHTML(b)).join('');
    wireBookExpand(list);
  }

  function bookItemHTML(b) {
    return `<li class="book-item">
      <div class="book-item-header">
        <div style="flex:1;min-width:0;">
          <div class="book-title">${b.title}</div>
          <div class="book-meta-row">
            <span class="book-author-year">${b.author} — ${b.year}</span>
            <span class="book-neighborhood">${b.area}</span>
          </div>
        </div>
        <span class="book-item-toggle">&#8964;</span>
      </div>
      <div class="book-expand">
        <div class="book-expand-inner">
          ${b.synopsis ? `<p class="book-synopsis">${b.synopsis}</p>` : ''}
          ${b.quote    ? `<p class="book-quote">${b.quote}</p>`       : ''}
        </div>
      </div>
    </li>`;
  }

  function wireBookExpand(container) {
    container.querySelectorAll('.book-item').forEach(item => {
      item.addEventListener('click', () => {
        const isOpen = item.classList.contains('open');
        container.querySelectorAll('.book-item.open').forEach(o => o.classList.remove('open'));
        if (!isOpen) item.classList.add('open');
      });
    });
  }

  /* ── Zoom & Pan ── */
  let zoomScale = 1;
  let panX      = 0;
  let panY      = 0;
  const ZOOM_MIN  = 1;
  const ZOOM_MAX  = 8;
  const ZOOM_STEP = 1.5;

  function applyTransform() {
    const vp = svg.parentElement;
    const cx = vp.getBoundingClientRect().width  / 2;
    const cy = vp.getBoundingClientRect().height / 2;
    /* scale around viewport centre, then offset by pan */
    const tx = cx - zoomScale * cx + panX;
    const ty = cy - zoomScale * cy + panY;
    zoomGroup.setAttribute('transform', `translate(${tx},${ty}) scale(${zoomScale})`);

    /* Keep country borders visually constant thickness */
    const invScale = 1 / zoomScale;
    landLayer.querySelectorAll('.country-path').forEach(p => {
      p.style.strokeWidth = (0.6 * invScale) + 'px';
    });

    /* Keep pins and labels constant visual size by counter-scaling each pin group */
    pinLayer.querySelectorAll('.book-pin').forEach(g => {
      const cx_ = parseFloat(g.querySelector('circle').getAttribute('cx'));
      const cy_ = parseFloat(g.querySelector('circle').getAttribute('cy'));
      /* Scale around the pin's own centre point so it stays anchored */
      g.setAttribute('transform',
        `translate(${cx_},${cy_}) scale(${invScale}) translate(${-cx_},${-cy_})`
      );
    });
  }

  function zoomBy(factor) {
    zoomScale = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, zoomScale * factor));
    /* clamp pan so map doesn't drift off-screen on zoom-out */
    if (zoomScale === 1) { panX = 0; panY = 0; }
    applyTransform();
    updateCursor();
  }

  document.getElementById('zoom-in').addEventListener('click',  () => zoomBy(ZOOM_STEP));
  document.getElementById('zoom-out').addEventListener('click', () => zoomBy(1 / ZOOM_STEP));
  document.getElementById('zoom-reset').addEventListener('click', () => { zoomScale = 1; panX = 0; panY = 0; applyTransform(); updateCursor(); });

  /* ── Drag to pan (only when zoomed in) ── */
  const mapVp = svg.parentElement;
  let isDragging  = false;
  let dragStartX  = 0;
  let dragStartY  = 0;
  let panStartX   = 0;
  let panStartY   = 0;

  mapVp.addEventListener('mousedown', e => {
    if (zoomScale <= 1) return;
    isDragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    panStartX  = panX;
    panStartY  = panY;
    mapVp.style.cursor = 'grabbing';
    e.preventDefault();
  });

  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    panX = panStartX + (e.clientX - dragStartX);
    panY = panStartY + (e.clientY - dragStartY);
    applyTransform();
  });

  window.addEventListener('mouseup', () => {
    if (!isDragging) return;
    isDragging = false;
    mapVp.style.cursor = zoomScale > 1 ? 'grab' : 'default';
  });

  /* Update cursor when zoom changes */
  function updateCursor() {
    mapVp.style.cursor = zoomScale > 1 ? 'grab' : 'default';
  }

  /* Reset zoom on continent change */
  const _origContSwitch = document.getElementById('continent-bar').onclick;


  /* ── Search ── */
  const searchInput   = document.getElementById('search-input');
  const searchResults = document.getElementById('search-results');

  /* Build a deduplicated country list from countryToCities */
  const searchableCountries = Object.entries(countryToCities)
    .filter(([country, cities]) => cities.some(c => cityData[c]))
    .reduce((acc, [country, cities]) => {
      /* deduplicate by canonical country name (skip alias keys like Ivory Coast) */
      const key = cities.sort().join(',');
      if (!acc.seen.has(key)) {
        acc.seen.add(key);
        acc.list.push({ country, cities: cities.filter(c => cityData[c]) });
      }
      return acc;
    }, { seen: new Set(), list: [] }).list;

  searchInput.addEventListener('input', function() {
    const q = this.value.trim().toLowerCase();
    if (!q) { searchResults.classList.remove('open'); return; }

    /* Country matches */
    const countryMatches = searchableCountries
      .filter(({ country, cities }) =>
        country.toLowerCase().includes(q) ||
        cities.some(c => c.toLowerCase().includes(q))
      )
      .slice(0, 3);

    /* Book matches */
    const bookMatches = allBooks.filter(b =>
      b.title.toLowerCase().includes(q)  || b.author.toLowerCase().includes(q) ||
      b.area.toLowerCase().includes(q)   || b.city.toLowerCase().includes(q)
    ).slice(0, 5);

    if (!countryMatches.length && !bookMatches.length) {
      searchResults.classList.remove('open');
      return;
    }

    let html = '';

    countryMatches.forEach(({ country, cities }) => {
      const totalBooks = cities.reduce((n, c) => n + (cityData[c] ? cityData[c].books.length : 0), 0);
      const cityList   = cities.join(', ');
      html += `<div class="search-result-item" data-type="country" data-country="${country}">
        <div class="sr-title">${country}</div>
        <div class="sr-meta">${cityList} · ${totalBooks} work${totalBooks !== 1 ? 's' : ''}</div>
      </div>`;
    });

    bookMatches.forEach(b => {
      const country = cityToCountry[b.city] || '';
      html += `<div class="search-result-item" data-type="city" data-city="${b.city}">
        <div class="sr-title">${b.title}</div>
        <div class="sr-meta">${b.author} · ${b.city}${country ? ', ' + country : ''}</div>
      </div>`;
    });

    searchResults.innerHTML = html;

    searchResults.querySelectorAll('.search-result-item').forEach(el => {
      el.addEventListener('click', () => {
        if (el.dataset.type === 'country') {
          selectCountry(el.dataset.country);
        } else {
          selectCity(el.dataset.city);
        }
        searchInput.value = '';
        searchResults.classList.remove('open');
      });
    });

    searchResults.classList.add('open');
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.shelf-search')) searchResults.classList.remove('open');
  });

  /* ── Era chips ── */
  document.querySelectorAll('.era-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.era-chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const val = btn.dataset.era;
      activeEraFilter = val === 'all' ? null : parseInt(val);
      /* update pin visibility */
      if (geoFeatures.length) refreshPins();
      /* re-render shelf if a city is selected */
      if (activeCity) {
        renderBookList(activeCity);
      } else if (activeCountry) {
        const cities = (countryToCities[activeCountry] || []).filter(c => cityData[c]);
        renderCountryBooks(cities);
      }
    });
  });

  /* ── Init ── */
  document.getElementById('breadcrumb-back').addEventListener('click', () => {
    if (activeCountry) selectCountry(activeCountry);
  });

  renderShelf('New York');
  </script>
